name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Set up JDK 21
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: |
          npx cap update android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          # Fix potential line ending issues in gradlew (Windows -> Linux transition)
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK
        run: |
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK built successfully"
          else
            echo "Build failed - APK not found"
            # List all APKs found as a backup diagnostic
            find android -name "*.apk"
            exit 1
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Eleprim-Accounting-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Job Summary
        run: |
          echo "## 🚀 Build Result" >> $GITHUB_STEP_SUMMARY
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "✅ **Build Successful!**" >> $GITHUB_STEP_SUMMARY
            echo "You can download the APK from the Artifacts section below." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build Failed!**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### 📦 How to download:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to the **Summary** tab of this run." >> $GITHUB_STEP_SUMMARY
          echo "2. Scroll down to the **Artifacts** section." >> $GITHUB_STEP_SUMMARY
          echo "3. Click on **Eleprim-Accounting-Debug**." >> $GITHUB_STEP_SUMMARY
