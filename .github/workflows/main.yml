name: Main CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Lint
        run: npm run lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Verify build output
        run: |
          if [ -d "dist" ]; then
            echo "dist directory exists. Contents:"
            ls -R dist | head -n 50
          else
            echo "Error: dist directory does not exist after build."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          wrapper-validation: off

      - name: Sync Capacitor
        run: |
          if [ -d "android" ]; then
            echo "Syncing Capacitor..."
            npx cap sync android
          fi

      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" -Dfile.encoding=UTF-8
        run: |
          if [ -d "android" ]; then
            cd android
            echo "Current directory: $(pwd)"
            
            # Ensure line endings are correct for linux
            sed -i 's/\r$//' gradlew
            chmod +x gradlew
            
            echo "Attempting build with gradlew..."
            ./gradlew assembleDebug --no-daemon --stacktrace --info || { 
              echo "Gradle build failed. Attempting to fix wrapper and retry..."
              # If gradlew fails, it might be due to a corrupted jar. 
              # We try to use the system gradle to repair it if available, 
              # or just log common issues.
              if command -v gradle > /dev/null; then
                gradle wrapper
                ./gradlew assembleDebug --no-daemon --stacktrace --info || {
                  echo "Retry failed. Build still failing."
                  find app -maxdepth 3
                  exit 1
                }
              else
                echo "System 'gradle' not found, cannot repair wrapper. Failing."
                find app -maxdepth 3
                exit 1
              fi
            }
            
            echo "Build successful. Searching for APKs..."
            find . -name "*.apk"
            
            # Copy all found APKs to a standard location for easy artifact upload
            mkdir -p ../build_artifacts
            find app/build/outputs/apk -name "*.apk" -exec cp {} ../build_artifacts/ \;
            
            echo "APKs copied to build_artifacts:"
            ls -la ../build_artifacts
          else
            echo "Error: android folder not found."
            exit 1
          fi

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Eleprim-Accounting-Debug-APK
          path: build_artifacts/*.apk
          if-no-files-found: error

      - name: Setup GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Job Summary
        if: always()
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          APK_COUNT=$(find build_artifacts -name "*.apk" 2>/dev/null | wc -l || echo "0")
          if [ "$APK_COUNT" -gt 0 ]; then
            echo "✅ **Android APK**: $APK_COUNT APK(s) built successfully!" >> $GITHUB_STEP_SUMMARY
            echo "Download them from the **Artifacts** section at the bottom of this page." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Android APK**: Failed to build or find APK." >> $GITHUB_STEP_SUMMARY
            echo "Check the logs of the 'Build Android APK' step for details." >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.deployment.outputs.page_url }}" != "" ]; then
            echo "✅ **Web Deploy**: [View Site](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
          fi
