name: Main CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Sync Capacitor
        run: |
          if [ -d "android" ]; then
            npx cap update android
            npx cap sync android
          fi

      - name: Build Android APK
        id: build_apk
        run: |
          if [ -d "android" ]; then
            cd android
            echo "Current directory: $(pwd)"
            ls -la
            sed -i 's/\r$//' gradlew
            chmod +x gradlew
            echo "Starting Gradle build..."
            ./gradlew assembleDebug --no-daemon --stacktrace || { 
              echo "Gradle build failed."
              exit 1 
            }
            
            echo "Searching for APKs..."
            find app/build/outputs/apk -name "*.apk"
          else
            echo "Android directory not found."
            exit 1
          fi

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Eleprim-Accounting-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Setup GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Job Summary
        if: always()
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          APK_COUNT=$(find android/app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | wc -l || echo "0")
          if [ "$APK_COUNT" -gt 0 ]; then
            echo "✅ **Android APK**: $APK_COUNT APK(s) built successfully!" >> $GITHUB_STEP_SUMMARY
            echo "Download them from the **Artifacts** section at the bottom of this page." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Android APK**: Failed to build or find APK." >> $GITHUB_STEP_SUMMARY
            echo "Check the logs of the 'Build Android APK' step for details." >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.deployment.outputs.page_url }}" != "" ]; then
            echo "✅ **Web Deploy**: [View Site](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
          fi
